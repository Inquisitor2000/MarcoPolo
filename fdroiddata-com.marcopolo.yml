    rm:
      - package.json
      - server/*
    prebuild:
      - sed -i -e '/signingConfig signingConfigs.getByName("debug")/d' app/build.gradle.kts
      - sed -i -e '/foojay-resolver-convention/d' settings.gradle.kts

