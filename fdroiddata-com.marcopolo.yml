    versionCode: 2
    commit: v1.1.0
    subdir: android
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    rm:
      - app/build/intermediates
    prebuild:
      - sed -i -e '/signingConfig signingConfigs.getByName("debug")/d' app/build.gradle.kts

