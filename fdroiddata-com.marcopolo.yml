AutoName: FindMe
Name: FindMe (Marco Polo)
Description: |-
  Find your friends and family in crowded places — no Google Play
  Services required.

  One person creates a session (Marco), the other joins with a
  4-character code (Polo). Both see each other on a real-time map
  with a walking route and turn-by-turn navigation.

  Features:
  ■ Real-time map with free CartoDB tiles (no API key)
  ■ Turn-by-turn navigation with street names and arrows
  ■ Routing modes: foot (pedestrian) or car (streets)
  ■ 15-minute session timer
  ■ Multi-language: English, Romanian, Russian
  ■ No Google Play Services — works on any device

  Perfect for festivals, concerts, malls, or any crowded space.

RepoType: git
Repo: https://github.com/Inquisitor2000/marcopolo-relay

Builds:
